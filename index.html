<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - 免费在线随机密码生成</title>
  <meta name="description" content="免费在线密码生成器，可自定义长度、字符类型，生成强随机密码，一键复制。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://fm-han.github.io/password-generator/">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a1a; color: #e2e8f0; font-family: system-ui, sans-serif; min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 16px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .btn-outline { border: 1px solid rgba(99,102,241,0.4); transition: all 0.3s; }
    .btn-outline:hover { background: rgba(99,102,241,0.1); }
    input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); cursor: pointer; }
    .password-display { font-family: 'Courier New', monospace; letter-spacing: 2px; word-break: break-all; }
    .strength-bar { height: 8px; border-radius: 4px; transition: all 0.5s; }
    .strength-weak { width: 25%; background: #ef4444; }
    .strength-fair { width: 50%; background: #f97316; }
    .strength-good { width: 75%; background: #eab308; }
    .strength-strong { width: 100%; background: #22c55e; }
  </style>
</head>
<body class="flex flex-col items-center justify-start p-6">

  <header class="text-center mb-8">
    <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">密码生成器</h1>
    <p class="text-gray-400 mt-2 text-sm">自定义长度与字符类型，生成安全随机密码</p>
  </header>

  <main class="w-full max-w-2xl flex flex-col gap-6">

    <!-- 密码显示 -->
    <div class="glass p-6 text-center">
      <div id="passwordDisplay" class="password-display text-2xl text-indigo-300 min-h-[3rem] mb-4"></div>
      <div class="flex gap-3 justify-center">
        <button onclick="generate()" class="btn-primary px-8 py-3 rounded-xl font-medium text-white text-sm">重新生成 🔄</button>
        <button onclick="copyPwd()" class="btn-outline px-6 py-3 rounded-xl text-gray-300 text-sm">复制 📋</button>
      </div>
    </div>

    <!-- 强度指示 -->
    <div class="glass p-4">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm text-gray-400">密码强度</span>
        <span id="strengthLabel" class="text-sm font-bold text-red-400">弱</span>
      </div>
      <div class="w-full bg-gray-800 rounded-full overflow-hidden">
        <div id="strengthBar" class="strength-bar strength-weak"></div>
      </div>
    </div>

    <!-- 长度 -->
    <div class="glass p-4">
      <div class="flex justify-between items-center mb-3">
        <label class="text-sm text-gray-400">密码长度</label>
        <span id="lengthLabel" class="text-indigo-400 font-bold">16</span>
      </div>
      <input type="range" id="lengthSlider" min="6" max="64" value="16" class="w-full" oninput="document.getElementById('lengthLabel').textContent = this.value; generate()">
      <div class="flex justify-between text-xs text-gray-600 mt-1">
        <span>6</span><span>32</span><span>64</span>
      </div>
    </div>

    <!-- 字符类型 -->
    <div class="glass p-4 space-y-3">
      <label class="text-sm text-gray-400 block mb-2">字符类型</label>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" id="chkUpper" checked onchange="generate()" class="w-5 h-5 accent-indigo-500">
        <span class="text-sm text-gray-300">大写字母 <span class="text-gray-500">(A-Z)</span></span>
      </label>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" id="chkLower" checked onchange="generate()" class="w-5 h-5 accent-indigo-500">
        <span class="text-sm text-gray-300">小写字母 <span class="text-gray-500">(a-z)</span></span>
      </label>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" id="chkNumber" checked onchange="generate()" class="w-5 h-5 accent-indigo-500">
        <span class="text-sm text-gray-300">数字 <span class="text-gray-500">(0-9)</span></span>
      </label>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" id="chkSymbol" checked onchange="generate()" class="w-5 h-5 accent-indigo-500">
        <span class="text-sm text-gray-300">特殊符号 <span class="text-gray-500">(!@#$%^&*)</span></span>
      </label>
    </div>

    <!-- 预设 -->
    <div class="glass p-4">
      <p class="text-xs text-gray-500 mb-3">快速预设</p>
      <div class="flex gap-2 flex-wrap">
        <button onclick="setPreset(8,'number')" class="btn-outline px-4 py-2 rounded-lg text-sm text-gray-400">8位 纯数字</button>
        <button onclick="setPreset(12,'all')" class="btn-outline px-4 py-2 rounded-lg text-sm text-gray-400">12位 全部</button>
        <button onclick="setPreset(16,'all')" class="btn-outline px-4 py-2 rounded-lg text-sm text-gray-400">16位 全部</button>
        <button onclick="setPreset(32,'all')" class="btn-outline px-4 py-2 rounded-lg text-sm text-gray-400">32位 全部</button>
      </div>
    </div>

  </main>

  <script>
    const CHAR_UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const CHAR_LOWER = 'abcdefghijklmnopqrstuvwxyz';
    const CHAR_NUMBER = '0123456789';
    const CHAR_SYMBOL = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    function generate() {
      const len = parseInt(document.getElementById('lengthSlider').value);
      let pool = '';
      if (document.getElementById('chkUpper').checked) pool += CHAR_UPPER;
      if (document.getElementById('chkLower').checked) pool += CHAR_LOWER;
      if (document.getElementById('chkNumber').checked) pool += CHAR_NUMBER;
      if (document.getElementById('chkSymbol').checked) pool += CHAR_SYMBOL;

      if (!pool) {
        document.getElementById('passwordDisplay').textContent = '请至少选择一种字符类型';
        return;
      }

      let pwd = '';
      // 确保每种选中的类型至少出现一次
      const guarantees = [];
      if (document.getElementById('chkUpper').checked) guarantees.push(CHAR_UPPER[Math.floor(Math.random() * CHAR_UPPER.length)]);
      if (document.getElementById('chkLower').checked) guarantees.push(CHAR_LOWER[Math.floor(Math.random() * CHAR_LOWER.length)]);
      if (document.getElementById('chkNumber').checked) guarantees.push(CHAR_NUMBER[Math.floor(Math.random() * CHAR_NUMBER.length)]);
      if (document.getElementById('chkSymbol').checked) guarantees.push(CHAR_SYMBOL[Math.floor(Math.random() * CHAR_SYMBOL.length)]);

      // 剩余随机填充
      for (let i = guarantees.length; i < len; i++) {
        pwd += pool[Math.floor(Math.random() * pool.length)];
      }

      // 插入保证字符
      guarantees.forEach(ch => {
        const pos = Math.floor(Math.random() * (len || 1));
        pwd = pwd.slice(0, pos) + ch + pwd.slice(pos);
      });

      // 如果长度小于保证字符数
      if (len < guarantees.length) pwd = guarantees.slice(0, len).join('');

      document.getElementById('passwordDisplay').textContent = pwd;
      updateStrength(pwd);
    }

    function updateStrength(pwd) {
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      const len = pwd.length;
      const hasUpper = /[A-Z]/.test(pwd);
      const hasLower = /[a-z]/.test(pwd);
      const hasNumber = /[0-9]/.test(pwd);
      const hasSymbol = /[^A-Za-z0-9]/.test(pwd);
      const types = [hasUpper, hasLower, hasNumber, hasSymbol].filter(Boolean).length;
      const score = len * types;

      bar.className = 'strength-bar';
      if (score < 30) { bar.classList.add('strength-weak'); label.textContent = '弱'; label.className = 'text-sm font-bold text-red-400'; }
      else if (score < 60) { bar.classList.add('strength-fair'); label.textContent = '一般'; label.className = 'text-sm font-bold text-orange-400'; }
      else if (score < 100) { bar.classList.add('strength-good'); label.textContent = '良好'; label.className = 'text-sm font-bold text-yellow-400'; }
      else { bar.classList.add('strength-strong'); label.textContent = '强'; label.className = 'text-sm font-bold text-green-400'; }
    }

    function setPreset(len, type) {
      document.getElementById('lengthSlider').value = len;
      document.getElementById('lengthLabel').textContent = len;
      document.getElementById('chkUpper').checked = type === 'number' ? false : true;
      document.getElementById('chkLower').checked = type === 'number' ? false : true;
      document.getElementById('chkNumber').checked = true;
      document.getElementById('chkSymbol').checked = type === 'number' ? false : true;
      generate();
    }

    function copyPwd() {
      const pwd = document.getElementById('passwordDisplay').textContent;
      if (!pwd || pwd.includes('请选择')) return;
      navigator.clipboard.writeText(pwd).then(() => {
        const btn = document.querySelector('[onclick="copyPwd()"]');
        btn.textContent = '已复制!';
        setTimeout(() => btn.textContent = '复制 📋', 1500);
      });
    }

    generate();
  </script>
</body>
</html>
